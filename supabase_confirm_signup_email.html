<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm your signup</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f5f1eb;
        color: #0b0f14;
        font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif;
      }
      .page {
        padding: 40px 6vw 80px;
        background:
          radial-gradient(circle at top left, rgba(216, 91, 47, 0.15), transparent 50%),
          radial-gradient(circle at 70% 20%, rgba(30, 42, 54, 0.12), transparent 55%),
          linear-gradient(180deg, #fbf7f1 0%, #f0e9e1 100%);
      }
      .container {
        max-width: 560px;
        margin: 0 auto;
      }
      .card {
        background: #ffffff;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 24px 48px rgba(30, 42, 54, 0.12);
        border: 1px solid rgba(30, 42, 54, 0.08);
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 12px;
        color: #a34120;
        font-weight: 600;
      }
      h2 {
        margin: 10px 0 12px;
        font-family: "Playfair Display", "Times New Roman", serif;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 16px;
        font-size: 16px;
        line-height: 1.6;
        color: #1b1f24;
      }
      .cta {
        display: inline-block;
        background: #d85b2f;
        color: #ffffff;
        padding: 12px 22px;
        border-radius: 999px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 10px 20px rgba(216, 91, 47, 0.25);
      }
      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #33404a;
      }
      .link {
        color: #a34120;
        text-decoration: underline;
        text-underline-offset: 3px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="container">
        <div class="card">
          <div class="eyebrow">Zaakwijzer</div>
          <h2>Confirm your signup</h2>
          <p>Follow this link to confirm your user:</p>
          <p><a class="cta" href="{{ .ConfirmationURL }}">Confirm your mail</a></p>
          <p class="footer">
            If the button doesn’t work, copy and paste this link into your
            browser:
            <br />
            <a class="link" href="{{ .ConfirmationURL }}">{{ .ConfirmationURL }}</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
